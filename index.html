<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dinner Planner</title>

<style>
body{font-family:-apple-system;background:#f6f7fb;padding:16px;}
button{padding:14px;width:100%;margin-bottom:10px;border:none;border-radius:12px;background:#2f6fed;color:white;font-size:16px;}
.day{background:white;padding:16px;margin-bottom:12px;border-radius:12px;cursor:pointer;}
.meal{font-weight:600;font-size:18px;}
.side{color:#444;margin-top:4px;}
.lock{font-size:12px;color:#888;margin-top:4px;}
.panel{background:white;padding:16px;border-radius:12px;margin-top:20px;}
</style>
</head>

<body>

<h2>Dinner Planner</h2>

<button onclick="generate()">Generate Week</button>
<button onclick="copyWeek()">Copy Week</button>

<div id="planner"></div>

<div class="panel">
<h3>Shopping List</h3>
<div id="grocery"></div>
</div>

<script>

// ================= MEALS =================

const MEALS=[

// Ground Beef
{meal:"Meatloaf",protein:"ground_beef",items:["Ground beef","Breadcrumbs"]},
{meal:"Hamburger Steaks",protein:"ground_beef",items:["Ground beef"]},
{meal:"Smash Burgers",protein:"ground_beef",items:["Ground beef","Buns"]},
{meal:"Hamburgers",protein:"ground_beef",items:["Ground beef","Buns"]},
{meal:"Tacos",protein:"ground_beef",items:["Ground beef","Taco shells"]},
{meal:"Spaghetti w Meat Sauce",protein:"ground_beef",items:["Ground beef","Pasta","Sauce"]},
{meal:"Sloppy Joes",protein:"ground_beef",items:["Ground beef","Buns"]},
{meal:"Chili Dogs",protein:"ground_beef",items:["Hot dogs","Chili"]},
{meal:"Hamburger Helper",protein:"ground_beef",items:["Ground beef","Pasta mix"]},
{meal:"Hamburger Soup",protein:"ground_beef",items:["Ground beef","Vegetables"],complete:true},

// Beef
{meal:"Cubed Steak",protein:"beef",items:["Cubed steak"]},
{meal:"Roast",protein:"beef",items:["Beef roast","Potatoes","Carrots"]},
{meal:"Steak",protein:"beef",items:["Steak"]},
{meal:"Philly Cheesesteaks",protein:"beef",items:["Steak","Bread","Cheese"]},

// Chicken
{meal:"Chicken Wings",protein:"chicken",items:["Chicken wings"]},
{meal:"Chicken Parm",protein:"chicken",items:["Chicken","Marinara","Cheese"]},
{meal:"Grilled Chicken",protein:"chicken",items:["Chicken"]},
{meal:"Chicken Quesadillas",protein:"chicken",items:["Chicken","Tortillas","Cheese"]},
{meal:"Grilled Chicken Sandwiches",protein:"chicken",items:["Chicken","Buns"]},
{meal:"Alice Springs Chicken",protein:"chicken",items:["Chicken","Bacon","Cheese"]},
{meal:"Buffalo Chicken",protein:"chicken",items:["Chicken","Buffalo sauce"]},
{meal:"Fajitas",protein:"chicken",items:["Chicken","Peppers","Tortillas"]},
{meal:"Chicken & Yellow Rice",protein:"chicken",items:["Chicken","Rice"],complete:true},
{meal:"Chicken Pot Pie",protein:"chicken",items:["Chicken","Vegetables"]},
{meal:"French Onion Chicken",protein:"chicken",items:["Chicken","Onion mix"]},
{meal:"Chicken Alfredo",protein:"chicken",items:["Chicken","Pasta","Alfredo sauce"]},
{meal:"Bruschetta Chicken",protein:"chicken",items:["Chicken","Tomatoes"]},
{meal:"Lemon Pepper Chicken",protein:"chicken",items:["Chicken"]},
{meal:"Smoked Chicken",protein:"chicken",items:["Chicken"]},
{meal:"Chicken Bowls w Black Beans & Rice",protein:"chicken",items:["Chicken","Rice","Beans"],complete:true},

// Pork
{meal:"Pork Chops",protein:"pork",items:["Pork chops"]},
{meal:"Pork Tenderloin",protein:"pork",items:["Pork"]},
{meal:"BBQ Pork",protein:"pork",items:["Pork","BBQ sauce"],complete:true},
{meal:"Ribs",protein:"pork",items:["Ribs","BBQ sauce"]},
{meal:"Sausage",protein:"pork",items:["Sausage"]},
{meal:"Fried Potatoes w Jalapeno Sausage",protein:"pork",items:["Sausage","Potatoes"]},

// Seafood
{meal:"Shrimp Boil",protein:"seafood",items:["Shrimp","Corn","Potatoes"],complete:true},
{meal:"Steamed Shrimp",protein:"seafood",items:["Shrimp"]},
{meal:"Salmon",protein:"seafood",items:["Salmon"]},
{meal:"Shrimp Alfredo",protein:"seafood",items:["Shrimp","Pasta"]},
{meal:"Shrimp Pasta",protein:"seafood",items:["Shrimp","Pasta"]},

// Mixed (not counted)
{meal:"Chili",protein:"mixed",items:["Ground beef","Beans"],complete:true},
{meal:"Gumbo",protein:"mixed",items:["Chicken","Sausage","Rice"],complete:true},
{meal:"Jambalaya",protein:"mixed",items:["Chicken","Sausage","Rice"],complete:true},
{meal:"Chicken & Dumplings",protein:"mixed",items:["Chicken","Dumplings"],complete:true},
{meal:"Veggie Soup",protein:"mixed",items:["Vegetables"],complete:true},
{meal:"Loaded Potato Soup",protein:"mixed",items:["Potatoes","Cheese"],complete:true},

// Other
{meal:"BLTs",protein:"mixed",items:["Bacon","Bread","Lettuce","Tomatoes"]},
{meal:"Chef Salads",protein:"mixed",items:["Lettuce","Ham","Turkey","Eggs"]},
{meal:"Caesar Salad w Grilled Chicken",protein:"chicken",items:["Chicken","Lettuce"]},
{meal:"Hot Dogs",protein:"pork",items:["Hot dogs","Buns"]},
{meal:"Lasagna",protein:"ground_beef",items:["Ground beef","Pasta","Cheese"]},
{meal:"Stuffed Shells",protein:"mixed",items:["Pasta","Cheese"]}

]

// ================= SIDES =================

const SIDE_GROUPS={
beef:["Mashed Potatoes","Asparagus","Sweet Potatoes"],
ground_beef:["Mac & Cheese","French Fries","Tater Tots"],
chicken:["Rice","Broccoli","Side Salad"],
pork:["Coleslaw","Baked Beans","Mac & Cheese"],
seafood:["Cornbread","Rice","Asparagus"],
mixed:[]
}

const SIDE_ITEMS={
"Mashed Potatoes":["Potatoes","Butter","Milk"],
"Asparagus":["Asparagus"],
"Sweet Potatoes":["Sweet potatoes"],
"Mac & Cheese":["Macaroni","Cheese"],
"French Fries":["Potatoes"],
"Tater Tots":["Potatoes"],
"Rice":["Rice"],
"Broccoli":["Broccoli"],
"Side Salad":["Lettuce","Tomatoes"],
"Coleslaw":["Coleslaw mix"],
"Baked Beans":["Baked beans"],
"Cornbread":["Cornbread mix"]
}

// ================= TAKEOUT =================

const TAKEOUT=["Chick-fil-A","McDonald's","Chinese","Wendy's"]

// ================= STATE =================

let currentPlan=[]
let locked={}

// ================= HISTORY =================

function getHistory(){
return JSON.parse(localStorage.getItem("mealHistory")||"[]")
}

function saveHistory(h){
localStorage.setItem("mealHistory",JSON.stringify(h))
}

// ================= HELPERS =================

function r(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ================= GENERATE =================

function generate(){

let used=[]
let history=getHistory()
let proteinCount={}
let plan=[]

function canUse(meal){

if(meal.protein==="mixed") return true

let count=proteinCount[meal.protein]||0

return count<3

}

function pickMeal(){

let options=MEALS.filter(m=>
!used.includes(m.meal) &&
!history.includes(m.meal) &&
canUse(m)
)

if(!options.length){
options=MEALS.filter(m=>canUse(m))
}

let chosen=r(options)

used.push(chosen.meal)

if(chosen.protein!=="mixed"){
proteinCount[chosen.protein]=(proteinCount[chosen.protein]||0)+1
}

return chosen

}

function add(day){

if(locked[day] && currentPlan.length){
let existing=currentPlan.find(d=>d.day===day)
if(existing){
plan.push(existing)
return
}
}

let meal=pickMeal()

let side=null

if(!meal.complete){
let group=SIDE_GROUPS[meal.protein]||[]
if(group.length){
side=r(group)
}
}

plan.push({
day,
meal:meal.meal,
items:meal.items,
side,
sideItems:side?SIDE_ITEMS[side]:[]
})

}

add("Thursday")
add("Friday")
add("Saturday")
add("Sunday")
add("Monday")

plan.push({day:"Tuesday",takeout:r(TAKEOUT)})

add("Wednesday")

currentPlan=plan

let newMeals=plan.filter(d=>!d.takeout).map(d=>d.meal)
history.push(...newMeals)
history=history.slice(-24)
saveHistory(history)

render()

}

// ================= RENDER =================

function render(){

let html=""
let grocery=[]

currentPlan.forEach(d=>{

html+=`<div class="day" onclick="toggleLock('${d.day}')">`
html+=`<h3>${d.day}</h3>`

if(d.takeout){
html+=`<div class="meal">🍔 ${d.takeout}</div>`
}else{
html+=`<div class="meal">🍽 ${d.meal}</div>`
grocery.push(...d.items)

if(d.side){
html+=`<div class="side">🥗 ${d.side}</div>`
grocery.push(...d.sideItems)
}
}

if(locked[d.day]) html+=`<div class="lock">🔒 Locked</div>`

html+=`</div>`

})

document.getElementById("planner").innerHTML=html

let unique=[...new Set(grocery)]

let list="<ul>"
unique.forEach(i=>list+=`<li>${i}</li>`)
list+="</ul>"

document.getElementById("grocery").innerHTML=list

}

// ================= SHARE =================

function copyWeek(){

let text="Dinner Plan:\n\n"

currentPlan.forEach(d=>{
if(d.takeout){
text+=`${d.day}: ${d.takeout}\n`
}else{
text+=`${d.day}: ${d.meal}${d.side?" + "+d.side:""}\n`
}
})

navigator.clipboard.writeText(text)

alert("Copied! Send it to Erica 👍")

}

// ================= LOCK =================

function toggleLock(day){
locked[day]=!locked[day]
render()
}

generate()

</script>

</body>
</html>
