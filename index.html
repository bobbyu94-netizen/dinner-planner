<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Umphlette Dinner Planner</title>

<style>

body{
font-family:-apple-system,system-ui;
background:#f6f7fb;
padding:16px;
}

button{
padding:14px;
font-size:16px;
margin-bottom:10px;
width:100%;
border-radius:12px;
border:none;
background:#2f6fed;
color:white;
}

.secondary{
background:white;
color:black;
border:1px solid #ddd;
}

.day{
background:white;
border-radius:14px;
padding:16px;
margin-bottom:14px;
border:1px solid #e1e4ea;
box-shadow:0 4px 10px rgba(0,0,0,.05);
cursor:pointer;
}

.meal{
font-size:18px;
font-weight:600;
margin-top:6px;
}

.side{
font-size:16px;
color:#444;
margin-top:4px;
}

.lock{
font-size:12px;
color:#888;
margin-top:6px;
}

.panel{
background:white;
border-radius:14px;
padding:16px;
border:1px solid #e1e4ea;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Umphlette Dinner Planner</h2>

<button onclick="generate()">Generate Week</button>

<div id="planner"></div>

<div class="panel">
<h3>Shopping List</h3>
<div id="grocery"></div>
</div>

<script>

const MEALS=[

{meal:"Chicken Wings"},
{meal:"Meatloaf"},
{meal:"Cubed Steak"},
{meal:"Hamburger Steaks"},
{meal:"Smash Burgers"},
{meal:"Chicken Parm"},
{meal:"Grilled Chicken"},
{meal:"Roast"},
{meal:"Chicken Quesadillas"},
{meal:"Tacos"},
{meal:"Pork Chops"},
{meal:"Pork Tenderloin"},
{meal:"Hamburgers"},
{meal:"Grilled Chicken Sandwiches"},
{meal:"Alice Springs Chicken"},
{meal:"Spaghetti w Meat Sauce"},
{meal:"Spaghetti w Meatballs"},
{meal:"Sloppy Joes"},
{meal:"Shrimp Boil",complete:true},
{meal:"Buffalo Chicken"},
{meal:"Fajitas"},
{meal:"Hibachi"},
{meal:"Chili",complete:true},
{meal:"Chili Dogs"},
{meal:"Sausage"},
{meal:"Chicken & Dumplings",complete:true},
{meal:"Chicken & Yellow Rice",complete:true},
{meal:"Chef Salads"},
{meal:"Veggie Soup",complete:true},
{meal:"Philly Cheesesteaks"},
{meal:"Caesar Salad w Grilled Chicken"},
{meal:"Ribs"},
{meal:"BBQ Pork",complete:true},
{meal:"Steak"},
{meal:"BLTs"},
{meal:"Hamburger Soup",complete:true},
{meal:"Chicken Pot Pie"},
{meal:"French Onion Chicken"},
{meal:"Loaded Potato Soup",complete:true},
{meal:"Hot Dogs"},
{meal:"Hamburger Helper"},
{meal:"Chicken Alfredo"},
{meal:"Shrimp Alfredo"},
{meal:"Shrimp Pasta"},
{meal:"Salmon"},
{meal:"Gumbo",complete:true},
{meal:"Jambalaya",complete:true},
{meal:"Steamed Shrimp"},
{meal:"Chicken Bowls w Black Beans & Rice",complete:true},
{meal:"Fried Potatoes w Jalapeno Sausage"},
{meal:"Lasagna"},
{meal:"Stuffed Shells"},
{meal:"Bruschetta Chicken"},
{meal:"Lemon Pepper Chicken"},
{meal:"Smoked Chicken"}

]

const SIDES=[

"Asparagus",
"Wild Rice",
"Broccoli Cheddar Rice",
"Mexican Rice",
"Black Beans",
"Baked Beans",
"Mac & Cheese",
"Mashed Potatoes",
"Brussels Sprouts",
"Fried Potatoes",
"Side Salad",
"Broccoli",
"Cornbread",
"Rice & Tomato Gravy",
"French Fries",
"Tater Tots",
"Seasoned Italian Green Beans",
"Dirty Rice",
"Coleslaw",
"Pasta Salad",
"Sweet Potatoes"

]

const TAKEOUT=[

"McDonald's",
"Chick-fil-A",
"Chili's",
"Wendy's",
"Joey's",
"Subs",
"Publix Chicken",
"Chinese",
"Mexican Food Truck",
"Slim Chickens"

]

let locked={}
let currentPlan=[]

function r(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function toggleLock(day){
locked[day]=!locked[day]
render()
}

function generate(){

let used=[]
let plan=[]

function pickMeal(){

let available=MEALS.filter(m=>!used.includes(m.meal))

if(available.length===0) available=MEALS

let chosen=r(available)

used.push(chosen.meal)

return chosen

}

function add(day){

if(locked[day] && currentPlan.length){

let existing=currentPlan.find(d=>d.day===day)

if(existing){
plan.push(existing)
used.push(existing.meal)
return
}

}

let meal=pickMeal()

let side=null

if(!meal.complete){
side=r(SIDES)
}

plan.push({day,meal:meal.meal,side,complete:meal.complete})

}

add("Thursday")
add("Friday")
add("Saturday")
add("Sunday")
add("Monday")

plan.push({day:"Tuesday",takeout:r(TAKEOUT)})

add("Wednesday")

currentPlan=plan

render()

}

function render(){

let grocery={}
let html=""

currentPlan.forEach(d=>{

html+="<div class='day' onclick='toggleLock(\""+d.day+"\")'>"
html+="<h3>"+d.day+"</h3>"

if(d.takeout){

html+="<div class='meal'>🍔 "+d.takeout+"</div>"

}else{

html+="<div class='meal'>🍽 "+d.meal+"</div>"

if(d.side){
html+="<div class='side'>🥗 "+d.side+"</div>"
}

}

if(locked[d.day]) html+="<div class='lock'>🔒 Locked</div>"

html+="</div>"

})

document.getElementById("planner").innerHTML=html

document.getElementById("grocery").innerHTML="Generated with meals and sides."

}

generate()

</script>

</body>
</html>
