<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dinner Planner</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui;background:#f6f7fb;padding:16px;color:#111827;}
button{padding:14px;width:100%;margin-bottom:10px;border:none;border-radius:12px;background:#2f6fed;color:white;font-size:16px;}
button.secondary{background:white;color:#111827;border:1px solid #d1d5db;}
.day{background:white;padding:16px;margin-bottom:12px;border-radius:12px;cursor:pointer;-webkit-user-select:none;
user-select:none;
-webkit-touch-callout:none;
  box-shadow:0 2px 8px rgba(0,0,0,.05);}
.meal{font-weight:600;font-size:18px;}
.side{color:#444;margin-top:4px;}
.lock{font-size:12px;color:#888;margin-top:4px;}
.panel{background:white;padding:16px;border-radius:12px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.small{font-size:13px;color:#6b7280;margin-top:4px;}
h2,h3,h4{margin:0 0 10px 0;}
ul{margin:8px 0 14px 20px;}
</style>
</head>
<body>

<h2>Dinner Planner</h2>

<button onclick="generate()">Generate Week</button>
<button onclick="showFavorites()">Manage Favorites</button>
<button class="secondary" onclick="copyShareLink()">Copy Share Link</button>

<div class="small">Tap any day card to lock or unlock it before generating again.</div>

<div id="planner"></div>

<div class="panel">
  <h3>Shopping List</h3>
  <div id="grocery"></div>
</div>

<script>
const MEALS = [
  {meal:"Meatloaf", protein:"ground_beef", items:["Ground beef","Breadcrumbs"]},
  {meal:"Hamburger Steaks", protein:"ground_beef", items:["Ground beef"]},
  {meal:"Smash Burgers", protein:"ground_beef", items:["Ground beef","Buns"]},
  {meal:"Hamburgers", protein:"ground_beef", items:["Ground beef","Buns"]},
  {meal:"Tacos", protein:"ground_beef", items:["Ground beef","Taco shells"]},
  {meal:"Spaghetti w Meat Sauce", protein:"ground_beef", items:["Ground beef","Pasta","Pasta sauce"]},
  {meal:"Sloppy Joes", protein:"ground_beef", items:["Ground beef","Buns","Sloppy joe sauce"]},
  {meal:"Hamburger Helper", protein:"ground_beef", items:["Ground beef","Pasta mix"]},
  {meal:"Hamburger Soup", protein:"ground_beef", items:["Ground beef","Mixed vegetables"], complete:true},
  {meal:"Lasagna", protein:"ground_beef", items:["Ground beef","Pasta","Cheese"]},

  {meal:"Cubed Steak", protein:"beef", items:["Cubed steak"]},
  {meal:"Roast", protein:"beef", items:["Beef roast","Potatoes","Carrots"]},
  {meal:"Steak", protein:"beef", items:["Steak"]},
  {meal:"Philly Cheesesteaks", protein:"beef", items:["Steak","Bread","Cheese"]},

  {meal:"Chicken Wings", protein:"chicken", items:["Chicken wings"]},
  {meal:"Chicken Parm", protein:"chicken", items:["Chicken","Marinara","Cheese"]},
  {meal:"Grilled Chicken", protein:"chicken", items:["Chicken"]},
  {meal:"Chicken Quesadillas", protein:"chicken", items:["Chicken","Tortillas","Cheese"]},
  {meal:"Grilled Chicken Sandwiches", protein:"chicken", items:["Chicken","Buns"]},
  {meal:"Alice Springs Chicken", protein:"chicken", items:["Chicken","Bacon","Cheese"]},
  {meal:"Buffalo Chicken", protein:"chicken", items:["Chicken","Buffalo sauce"]},
  {meal:"Fajitas", protein:"chicken", items:["Chicken","Peppers","Tortillas"]},
  {meal:"Chicken & Yellow Rice", protein:"chicken", items:["Chicken","Rice"], complete:true},
  {meal:"Chicken Pot Pie", protein:"chicken", items:["Chicken","Vegetables"]},
  {meal:"French Onion Chicken", protein:"chicken", items:["Chicken","Onion soup mix"]},
  {meal:"Chicken Alfredo", protein:"chicken", items:["Chicken","Pasta","Alfredo sauce"]},
  {meal:"Bruschetta Chicken", protein:"chicken", items:["Chicken","Tomatoes"]},
  {meal:"Lemon Pepper Chicken", protein:"chicken", items:["Chicken"]},
  {meal:"Smoked Chicken", protein:"chicken", items:["Chicken"]},
  {meal:"Chicken Bowls w Black Beans & Rice", protein:"chicken", items:["Chicken","Rice","Black beans"], complete:true},
  {meal:"Caesar Salad w Grilled Chicken", protein:"chicken", items:["Chicken","Lettuce","Caesar dressing"]},

  {meal:"Pork Chops", protein:"pork", items:["Pork chops"]},
  {meal:"Pork Tenderloin", protein:"pork", items:["Pork tenderloin"]},
  {meal:"BBQ Pork", protein:"pork", items:["Pork","BBQ sauce"], complete:true},
  {meal:"Ribs", protein:"pork", items:["Ribs","BBQ sauce"]},
  {meal:"Sausage", protein:"pork", items:["Sausage"]},
  {meal:"Fried Potatoes w Jalapeno Sausage", protein:"pork", items:["Sausage","Potatoes"]},
  {meal:"Hot Dogs", protein:"pork", items:["Hot dogs","Buns"]},
  {meal:"Chili Dogs", protein:"pork", items:["Hot dogs","Chili"]},

  {meal:"Shrimp Boil", protein:"seafood", items:["Shrimp","Corn","Potatoes"], complete:true},
  {meal:"Steamed Shrimp", protein:"seafood", items:["Shrimp"]},
  {meal:"Salmon", protein:"seafood", items:["Salmon"]},
  {meal:"Shrimp Alfredo", protein:"seafood", items:["Shrimp","Pasta","Alfredo sauce"]},
  {meal:"Shrimp Pasta", protein:"seafood", items:["Shrimp","Pasta"]},

  {meal:"Chili", protein:"mixed", items:["Ground beef","Beans"], complete:true},
  {meal:"Gumbo", protein:"mixed", items:["Chicken","Sausage","Rice"], complete:true},
  {meal:"Jambalaya", protein:"mixed", items:["Chicken","Sausage","Rice"], complete:true},
  {meal:"Chicken & Dumplings", protein:"mixed", items:["Chicken","Dumplings"], complete:true},
  {meal:"Veggie Soup", protein:"mixed", items:["Mixed vegetables"], complete:true},
  {meal:"Loaded Potato Soup", protein:"mixed", items:["Potatoes","Cheese"], complete:true},
  {meal:"Hibachi", protein:"mixed", items:["Chicken","Rice","Vegetables"]},
  {meal:"Chef Salads", protein:"mixed", items:["Lettuce","Ham","Turkey","Eggs"]},
  {meal:"Stuffed Shells", protein:"mixed", items:["Pasta","Cheese"]},
  {meal:"BLTs", protein:"mixed", items:["Bacon","Bread","Lettuce","Tomatoes"]}
];

const SIDE_ITEMS = {
  "Asparagus":["Asparagus"],
  "Wild Rice":["Rice"],
  "Broccoli Cheddar Rice":["Rice","Cheese","Broccoli"],
  "Mexican Rice":["Rice"],
  "Black Beans":["Beans"],
  "Baked Beans":["Baked beans"],
  "Mac & Cheese":["Macaroni","Cheese"],
  "Mashed Potatoes":["Potatoes","Butter","Milk"],
  "Brussels Sprouts":["Brussels sprouts"],
  "Fried Potatoes":["Potatoes"],
  "Side Salad":["Lettuce","Tomatoes"],
  "Broccoli":["Broccoli"],
  "Cornbread":["Cornbread mix"],
  "Rice & Tomato Gravy":["Rice","Tomato sauce"],
  "French Fries":["Potatoes"],
  "Tater Tots":["Potatoes"],
  "Seasoned Italian Green Beans":["Green beans"],
  "Dirty Rice":["Rice"],
  "Coleslaw":["Coleslaw mix"],
  "Pasta Salad":["Pasta","Dressing"],
  "Sweet Potatoes":["Sweet potatoes"]
};

const SIDE_GROUPS = {
  ground_beef:["Mac & Cheese","French Fries","Tater Tots","Pasta Salad","Side Salad"],
  beef:["Mashed Potatoes","Asparagus","Sweet Potatoes","Seasoned Italian Green Beans","Side Salad"],
  chicken:["Rice & Tomato Gravy","Broccoli","Side Salad","Mexican Rice","Pasta Salad","Wild Rice"],
  pork:["Coleslaw","Baked Beans","Mac & Cheese","Sweet Potatoes","Mashed Potatoes","Fried Potatoes"],
  seafood:["Asparagus","Wild Rice","Cornbread","Broccoli","Pasta Salad"],
  mixed:[]
};

const SIDE_OVERRIDES = {
  "Tacos":["Mexican Rice","Black Beans"],
  "Fajitas":["Mexican Rice","Black Beans"],
  "Chicken Quesadillas":["Mexican Rice","Black Beans"],
  "Spaghetti w Meat Sauce":["Pasta Salad","Side Salad","Broccoli"],
  "Chicken Alfredo":["Broccoli","Side Salad","Pasta Salad"],
  "Shrimp Alfredo":["Broccoli","Side Salad"],
  "Shrimp Pasta":["Broccoli","Side Salad"],
  "Ribs":["Baked Beans","Coleslaw","Mac & Cheese"],
  "BBQ Pork":["Coleslaw","Baked Beans"],
  "Hot Dogs":["French Fries","Baked Beans","Coleslaw"],
  "Chili Dogs":["French Fries","Coleslaw"],
  "Philly Cheesesteaks":["French Fries","Tater Tots","Side Salad"],
  "BLTs":["Pasta Salad","French Fries","Tater Tots"],
  "Salmon":["Asparagus","Wild Rice","Broccoli"],
  "Steak":["Mashed Potatoes","Asparagus","Sweet Potatoes"],
  "Roast":["Mashed Potatoes","Seasoned Italian Green Beans","Sweet Potatoes"],
  "Meatloaf":["Mashed Potatoes","Seasoned Italian Green Beans","Mac & Cheese"]
};

const TAKEOUT = [
  "McDonald's","Chick-fil-A","Chili's","Wendy's","Joey's",
  "Subs","Publix Chicken","Chinese","Mexican Food Truck","Slim Chickens"
];

let currentPlan = [];
let locked = {};

let favorites = JSON.parse(localStorage.getItem("favorites") || "[]")
let blocked = JSON.parse(localStorage.getItem("blocked") || "[]")

function getHistory(){
  return JSON.parse(localStorage.getItem("mealHistory") || "[]");
}
function saveHistory(h){
  localStorage.setItem("mealHistory", JSON.stringify(h));
}

function r(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function canUseProtein(meal, proteinCount){
  if (meal.protein === "mixed") return true;
  return (proteinCount[meal.protein] || 0) < 3;
}

function pickMeal(usedMeals, history, proteinCount){
  let options = MEALS.filter(m =>
  !usedMeals.includes(m.meal) &&
  !history.includes(m.meal) &&
  !blocked.includes(m.meal) &&
  canUseProtein(m, proteinCount)
)

  if (!options.length) {
    options = MEALS.filter(m =>
      !usedMeals.includes(m.meal) &&
      canUseProtein(m, proteinCount)
    );
  }

  if (!options.length) {
    options = MEALS.filter(m => !usedMeals.includes(m.meal));
  }

  if (!options.length) {
    options = MEALS;
  }

  // Favor favorites
let favOptions = options.filter(m => favorites.includes(m.meal))

if(favOptions.length && Math.random() < 0.6){
  options = favOptions
}
  
  const chosen = r(options);
  usedMeals.push(chosen.meal);

  if (chosen.protein !== "mixed") {
    proteinCount[chosen.protein] = (proteinCount[chosen.protein] || 0) + 1;
  }

  return chosen;
}

function pickSide(mealName, protein){
  const pool = SIDE_OVERRIDES[mealName] || SIDE_GROUPS[protein] || [];
  if (!pool.length) return null;
  return r(pool);
}

function generate(){
  const usedMeals = [];
  const history = getHistory();
  const proteinCount = {};
  const plan = [];

  function add(day){
    if (locked[day] && currentPlan.length) {
      const existing = currentPlan.find(d => d.day === day);
      if (existing) {
        plan.push(existing);
        if (!existing.takeout && existing.meal) {
          usedMeals.push(existing.meal);
        }
        return;
      }
    }

    const meal = pickMeal(usedMeals, history, proteinCount);
    const side = meal.complete ? null : pickSide(meal.meal, meal.protein);

    plan.push({
      day,
      meal: meal.meal,
      items: meal.items,
      side,
      sideItems: side ? (SIDE_ITEMS[side] || []) : [],
      complete: !!meal.complete
    });
  }

  add("Thursday");
  add("Friday");
  add("Saturday");
  add("Sunday");
  add("Monday");

  if (locked["Tuesday"] && currentPlan.length) {
    const existing = currentPlan.find(d => d.day === "Tuesday");
    if (existing) plan.push(existing);
    else plan.push({day:"Tuesday", takeout:r(TAKEOUT)});
  } else {
    plan.push({day:"Tuesday", takeout:r(TAKEOUT)});
  }

  add("Wednesday");

  currentPlan = plan;

  const newMeals = plan.filter(d => !d.takeout).map(d => d.meal);
  const newHistory = history.concat(newMeals).slice(-24);
  saveHistory(newHistory);

  render();
}

function categorize(item){
  const s = item.toLowerCase();

  if (
    s.includes("beef") || s.includes("chicken") || s.includes("pork") ||
    s.includes("steak") || s.includes("shrimp") || s.includes("sausage") ||
    s.includes("salmon") || s.includes("ribs") || s.includes("hot dogs") ||
    s.includes("ham") || s.includes("turkey")
  ) return "Meat";

  if (
    s.includes("lettuce") || s.includes("tomato") || s.includes("potato") ||
    s.includes("broccoli") || s.includes("corn") || s.includes("carrot") ||
    s.includes("asparagus") || s.includes("sprouts") || s.includes("beans") ||
    s.includes("green beans") || s.includes("vegetables")
  ) return "Produce";

  if (
    s.includes("cheese") || s.includes("milk") || s.includes("butter") ||
    s.includes("alfredo")
  ) return "Dairy";

  if (
    s.includes("pasta") || s.includes("rice") || s.includes("bread") ||
    s.includes("shells") || s.includes("sauce") || s.includes("dressing") ||
    s.includes("breadcrumbs") || s.includes("mix") || s.includes("dumplings")
  ) return "Pantry";

  return "Other";
}

function render(){
  let html = "";
  const grocery = [];

  currentPlan.forEach(d => {
    html += `<div class="day"
onclick="toggleLock('${d.day}')"
ontouchstart="startPress('${d.day}')"
ontouchend="endPress()"
ontouchcancel="endPress()"
onmousedown="startPress('${d.day}')"
onmouseup="endPress()"
onmouseleave="endPress()"
oncontextmenu="return false;">`
    html += `<h3>${d.day}</h3>`;

    if (d.takeout) {
      html += `<div class="meal">🍔 ${d.takeout}</div>`;
    } else {
      html += `<div class="meal">🍽 ${d.meal}</div>`;
      grocery.push(...d.items);

      if (d.side) {
        html += `<div class="side">🥗 ${d.side}</div>`;
        grocery.push(...d.sideItems);
      }
    }

    if (locked[d.day]) {
      html += `<div class="lock">🔒 Locked</div>`;
    }

    html += `</div>`;
  });

  document.getElementById("planner").innerHTML = html;

  const unique = [...new Set(grocery)];
  const groups = {};

  unique.forEach(item => {
    const cat = categorize(item);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  const order = ["Produce","Meat","Dairy","Pantry","Other"];
  let list = "";

  order.forEach(cat => {
    if (!groups[cat] || !groups[cat].length) return;
    groups[cat].sort((a,b) => a.localeCompare(b));
    list += `<h4>${cat}</h4><ul>`;
    groups[cat].forEach(i => {
      list += `<li>${i}</li>`;
    });
    list += `</ul>`;
  });

  document.getElementById("grocery").innerHTML = list || "<div class='small'>No items yet.</div>";
}

function copyShareLink(){

try{

const json = JSON.stringify(currentPlan)

// encode safely
const encoded = btoa(unescape(encodeURIComponent(json)))

const url = location.origin + location.pathname + "#data=" + encoded

navigator.clipboard.writeText(url)

alert("Share link copied 👍")

}catch(e){
alert("Error creating link")
}

}


function loadSharedWeek(){

const hash = location.hash

if(!hash.startsWith("#data=")) return false

try{

const encoded = hash.replace("#data=","")

const json = decodeURIComponent(escape(atob(encoded)))

const data = JSON.parse(json)

if(Array.isArray(data)){
currentPlan = data
render()
return true
}

}catch(e){
console.log("Load failed", e)
}

return false

}

function toggleLock(day){
  locked[day] = !locked[day];
  render();
}


let pressTimer = null;
let menuDay = null;

function startPress(day){
  pressTimer = setTimeout(() => {
    openMenu(day);
  }, 1000);
}

function endPress(){
  clearTimeout(pressTimer);
}

function openMenu(day){
  menuDay = day;
  document.getElementById("menu").style.display = "block";
}

function closeMenu(){
  document.getElementById("menu").style.display = "none";
}

function favoriteMeal(day){
  const d = currentPlan.find(x => x.day === day);
  if(!d || d.takeout) return;

  if(!favorites.includes(d.meal)){
    favorites.push(d.meal);
    localStorage.setItem("favorites", JSON.stringify(favorites));
  }

  closeMenu();
  alert(d.meal + " added to favorites ⭐");
}

function skipMeal(day){
  const d = currentPlan.find(x => x.day === day);
  if(!d || d.takeout) return;

  if(!blocked.includes(d.meal)){
    blocked.push(d.meal);
    localStorage.setItem("blocked", JSON.stringify(blocked));
  }

  closeMenu();
  alert(d.meal + " skipped 🚫");
}

function regenerateDay(day){
  let history = getHistory();
  let proteinCount = {};

  currentPlan.forEach(d => {
    if(d.day !== day && d.meal){
      const m = MEALS.find(x => x.meal === d.meal);
      if(m && m.protein !== "mixed"){
        proteinCount[m.protein] = (proteinCount[m.protein] || 0) + 1;
      }
    }
  });

  const usedMeals = currentPlan
    .filter(d => d.day !== day)
    .map(d => d.meal)
    .filter(Boolean);

  const meal = pickMeal(usedMeals, history, proteinCount);
  const side = meal.complete ? null : pickSide(meal.meal, meal.protein);

  const index = currentPlan.findIndex(d => d.day === day);

  currentPlan[index] = {
    day,
    meal: meal.meal,
    items: meal.items,
    side,
    sideItems: side ? (SIDE_ITEMS[side] || []) : [],
    complete: !!meal.complete
  };

  closeMenu();
  render();
}

let moveFromDay = null;

function moveMeal(fromDay){
  moveFromDay = fromDay;

  const days = currentPlan.map(d => d.day);

  let html = "";

  days.forEach(day => {
    if(day === fromDay) return;

    html += `<div style="padding:14px;border-bottom:1px solid #eee;cursor:pointer;"
    onclick="confirmMove('${day}')">
    ${day}
    </div>`;
  });

  document.getElementById("moveList").innerHTML = html;
  document.getElementById("movePanel").style.display = "block";

  closeMenu();
}

function confirmMove(toDay){

  const fromIndex = currentPlan.findIndex(d => d.day === moveFromDay);
  const toIndex = currentPlan.findIndex(d => d.day === toDay);

  if(fromIndex === -1 || toIndex === -1){
    alert("Invalid move");
    return;
  }

  const fromEntry = currentPlan[fromIndex];
  const toEntry = currentPlan[toIndex];

  const fromContent = {
    takeout: fromEntry.takeout,
    meal: fromEntry.meal,
    items: fromEntry.items,
    side: fromEntry.side,
    sideItems: fromEntry.sideItems,
    complete: fromEntry.complete
  };

  const toContent = {
    takeout: toEntry.takeout,
    meal: toEntry.meal,
    items: toEntry.items,
    side: toEntry.side,
    sideItems: toEntry.sideItems,
    complete: toEntry.complete
  };

  currentPlan[fromIndex] = { day: fromEntry.day, ...toContent };
  currentPlan[toIndex] = { day: toEntry.day, ...fromContent };

  closeMove();
  render();
}

function closeMove(){
  document.getElementById("movePanel").style.display = "none";
}
  
  
function showFavorites(){
  const panel = document.getElementById("favoritesPanel");
  const list = document.getElementById("favoritesList");

  if(!favorites.length){
    list.innerHTML = "<p>No favorites yet.</p>";
  } else {
    list.innerHTML = favorites.map(m => `
      <div style="padding:10px 0;border-bottom:1px solid #eee;">
        ${m}
        <button onclick="removeFavorite('${m.replace(/'/g, "\\'")}')" style="margin-top:8px;">Remove</button>
      </div>
    `).join("");
  }

  panel.style.display = "block";
}

function closeFavorites(){
  document.getElementById("favoritesPanel").style.display = "none";
}

function removeFavorite(meal){
  favorites = favorites.filter(m => m !== meal);
  localStorage.setItem("favorites", JSON.stringify(favorites));
  showFavorites();
}
  
if (!loadSharedWeek()) {
  generate();
}
</script>

<div id="menu" style="display:none;position:fixed;left:0;right:0;bottom:0;background:white;border-top-left-radius:16px;border-top-right-radius:16px;padding:16px;box-shadow:0 -4px 16px rgba(0,0,0,.2);z-index:1000;">
  <div onclick="favoriteMeal(menuDay)" style="padding:14px;border-bottom:1px solid #eee;">⭐ Favorite</div>
  <div onclick="skipMeal(menuDay)" style="padding:14px;border-bottom:1px solid #eee;">🚫 Skip</div>
  <div onclick="regenerateDay(menuDay)" style="padding:14px;border-bottom:1px solid #eee;">🔄 Regenerate</div>
  <div onclick="moveMeal(menuDay)" style="padding:14px;border-bottom:1px solid #eee;">🔀 Move to another day</div>
  <div onclick="closeMenu()" style="padding:14px;color:red;">Cancel</div>
</div>

<div id="favoritesPanel" style="display:none;position:fixed;inset:0;background:white;padding:20px;overflow:auto;z-index:1001;">
  <h3>Favorites</h3>
  <div id="favoritesList"></div>
  <button onclick="closeFavorites()">Close</button>
</div>

<div id="movePanel" style="display:none;position:fixed;inset:0;background:white;padding:20px;z-index:1002;overflow:auto;">

<h3>Move meal to:</h3>
<div id="moveList"></div>

<button onclick="closeMove()">Cancel</button>

</div>
  
</body>
</html>
