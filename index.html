<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Umphlette Dinner Planner</title>

<style>

body{
font-family:-apple-system,system-ui;
background:#f6f7fb;
padding:16px;
}

button{
padding:14px;
font-size:16px;
margin-bottom:10px;
width:100%;
border-radius:12px;
border:none;
background:#2f6fed;
color:white;
}

.secondary{
background:white;
color:black;
border:1px solid #ddd;
}

.day{
background:white;
border-radius:14px;
padding:16px;
margin-bottom:14px;
border:1px solid #e1e4ea;
box-shadow:0 4px 10px rgba(0,0,0,.05);
cursor:pointer;
}

.meal{
font-size:18px;
font-weight:600;
margin-top:6px;
}

.side{
font-size:16px;
color:#444;
margin-top:4px;
}

.lock{
font-size:12px;
color:#888;
margin-top:6px;
}

.panel{
background:white;
border-radius:14px;
padding:16px;
border:1px solid #e1e4ea;
margin-top:20px;
}

.hidden{
display:none;
}

input,textarea,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<h2>Umphlette Dinner Planner</h2>

<button onclick="generate()">Generate Week</button>
<button class="secondary" onclick="toggleEditor()">Show / Hide Editor</button>

<div id="planner"></div>

<div class="panel">
<h3>Shopping List</h3>
<div id="grocery"></div>
</div>

<div id="editor" class="panel hidden">

<h3>Meal Editor</h3>

<input id="mealName" placeholder="Meal Name">
<input id="mealSide" placeholder="Side">
<select id="mealType">
<option value="weekday">Weekday</option>
<option value="weekend">Weekend</option>
</select>

<textarea id="mealItems" placeholder="Ingredients separated by commas"></textarea>

<button onclick="saveMeal()">Save Meal</button>

<hr>

<h3>Existing Meals</h3>

<div id="mealList"></div>

<hr>

<h3>Takeout Options</h3>

<input id="takeoutName" placeholder="Add Takeout Option">
<button onclick="addTakeout()">Add Takeout</button>

<div id="takeoutList"></div>

</div>

<script>

const DEFAULT_MEALS = {

weekday: [

{meal:"Tacos",side:"Mexican Rice",items:["Ground beef","Taco shells","Lettuce","Tomatoes","Rice"]},

{meal:"Chicken Alfredo",side:"Garden Salad",items:["Chicken breast","Fettuccine","Alfredo sauce","Salad mix"]},

{meal:"Sloppy Joes",side:"Coleslaw",items:["Ground beef","Sloppy joe sauce","Burger buns","Coleslaw mix"]},

{meal:"Chicken Quesadillas",side:"Mexican Rice",items:["Chicken","Tortillas","Cheese","Rice"]},

{meal:"BLTs",side:"Pasta Salad",items:["Bacon","Bread","Lettuce","Tomatoes"]},

{meal:"Spaghetti w/ Meat Sauce",side:"Garlic Bread",items:["Ground beef","Spaghetti","Pasta sauce","Bread"]},

{meal:"Fajitas",side:"Mexican Rice",items:["Chicken","Peppers","Tortillas","Rice"]}

],

weekend: [

{meal:"Steak",side:"Baked Beans",items:["Steak","Baked beans"]},

{meal:"Ribs",side:"Mac & Cheese",items:["Ribs","Mac & cheese"]},

{meal:"Roast",side:"Mashed Potatoes",items:["Roast","Potatoes","Carrots"]},

{meal:"Chicken & Dumplings",side:"Cornbread",items:["Chicken","Dumplings","Cornbread mix"]},

{meal:"Pork Chops",side:"Fried Okra",items:["Pork chops","Okra"]},

{meal:"Meatloaf",side:"Green Beans",items:["Ground beef","Green beans"]},

{meal:"Chili",side:"Cornbread",items:["Ground beef","Beans","Tomato sauce"]}

]

}

const DEFAULT_TAKEOUT = [
"Chinese",
"Pizza",
"Wendy's",
"Mexican",
"BBQ"
]

let locked={}
let currentPlan=[]
let editingMeal=null

function loadMeals(){
return JSON.parse(localStorage.getItem("plannerMeals")||JSON.stringify(DEFAULT_MEALS))
}

function saveMeals(meals){
localStorage.setItem("plannerMeals",JSON.stringify(meals))
}

function loadTakeout(){
return JSON.parse(localStorage.getItem("plannerTakeout")||JSON.stringify(DEFAULT_TAKEOUT))
}

function saveTakeout(list){
localStorage.setItem("plannerTakeout",JSON.stringify(list))
}

function r(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function toggleLock(day){
locked[day]=!locked[day]
render()
}

function generate(){

let meals=loadMeals()
let takeout=loadTakeout()

let plan=[]

function pick(pool){
return r(pool)
}

plan.push({day:"Thursday",data:pick(meals.weekday)})
plan.push({day:"Friday",data:pick(meals.weekend)})
plan.push({day:"Saturday",data:pick(meals.weekend)})
plan.push({day:"Sunday",data:pick(meals.weekend)})
plan.push({day:"Monday",data:pick(meals.weekday)})
plan.push({day:"Tuesday",takeout:r(takeout)})
plan.push({day:"Wednesday",data:pick(meals.weekday)})

currentPlan=plan

render()

}

function categorize(item){

item=item.toLowerCase()

if(item.includes("beef")||item.includes("chicken")||item.includes("pork")||item.includes("steak"))
return "Meat"

if(item.includes("lettuce")||item.includes("tomato")||item.includes("potato"))
return "Produce"

if(item.includes("rice")||item.includes("pasta")||item.includes("bread"))
return "Pantry"

return "Other"

}

function render(){

let grocery={}
let html=""

currentPlan.forEach(d=>{

html+="<div class='day' onclick='toggleLock(\""+d.day+"\")'>"
html+="<h3>"+d.day+"</h3>"

if(d.takeout){

html+="<div class='meal'>🍔 "+d.takeout+"</div>"

}else{

html+="<div class='meal'>🍽 "+d.data.meal+"</div>"
html+="<div class='side'>🥗 "+d.data.side+"</div>"

d.data.items.forEach(i=>{

let cat=categorize(i)

if(!grocery[cat]) grocery[cat]=[]

grocery[cat].push(i)

})

}

if(locked[d.day]) html+="<div class='lock'>🔒 Locked</div>"

html+="</div>"

})

document.getElementById("planner").innerHTML=html

let list=""

for(let cat in grocery){

list+="<h4>"+cat+"</h4><ul>"

grocery[cat].forEach(i=>{
list+="<li>"+i+"</li>"
})

list+="</ul>"

}

document.getElementById("grocery").innerHTML=list

renderMealList()
renderTakeoutList()

}

function toggleEditor(){
document.getElementById("editor").classList.toggle("hidden")
}

function saveMeal(){

let meals=loadMeals()

let name=document.getElementById("mealName").value
let side=document.getElementById("mealSide").value
let type=document.getElementById("mealType").value
let items=document.getElementById("mealItems").value.split(",")

if(editingMeal){

meals[type][editingMeal].meal=name
meals[type][editingMeal].side=side
meals[type][editingMeal].items=items

editingMeal=null

}else{

meals[type].push({
meal:name,
side:side,
items:items
})

}

saveMeals(meals)

document.getElementById("mealName").value=""
document.getElementById("mealSide").value=""
document.getElementById("mealItems").value=""

render()

}

function renderMealList(){

let meals=loadMeals()

let html=""

for(let type in meals){

html+="<h4>"+type+"</h4>"

meals[type].forEach((m,i)=>{

html+=`
<div>
<strong>${m.meal}</strong><br>
Side: ${m.side}<br>
<button onclick="editMeal('${type}',${i})">Edit</button>
<button onclick="deleteMeal('${type}',${i})">Delete</button>
</div>
<hr>
`

})

}

document.getElementById("mealList").innerHTML=html

}

function editMeal(type,index){

let meals=loadMeals()

let m=meals[type][index]

document.getElementById("mealName").value=m.meal
document.getElementById("mealSide").value=m.side
document.getElementById("mealType").value=type
document.getElementById("mealItems").value=m.items.join(",")

editingMeal=index

}

function deleteMeal(type,index){

let meals=loadMeals()

meals[type].splice(index,1)

saveMeals(meals)

render()

}

function addTakeout(){

let name=document.getElementById("takeoutName").value

let list=loadTakeout()

list.push(name)

saveTakeout(list)

document.getElementById("takeoutName").value=""

render()

}

function renderTakeoutList(){

let list=loadTakeout()

let html=""

list.forEach((t,i)=>{

html+=`
<div>
${t}
<button onclick="deleteTakeout(${i})">Delete</button>
</div>
`

})

document.getElementById("takeoutList").innerHTML=html

}

function deleteTakeout(i){

let list=loadTakeout()

list.splice(i,1)

saveTakeout(list)

render()

}

generate()

</script>

</body>
</html>
