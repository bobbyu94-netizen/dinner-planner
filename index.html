<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Umphlette Dinner Planner</title>

<style>

body{
font-family:-apple-system,system-ui;
background:#f6f7fb;
padding:16px;
}

button{
padding:14px;
font-size:16px;
margin-bottom:16px;
width:100%;
border-radius:10px;
border:none;
background:#2f6fed;
color:white;
}

.day{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:14px;
border:1px solid #e1e4ea;
}

.day h3{
margin:0;
}

.meal{
font-size:18px;
font-weight:600;
margin-top:6px;
}

.side{
font-size:16px;
color:#444;
margin-top:4px;
}

#grocery{
background:white;
border-radius:12px;
padding:16px;
border:1px solid #e1e4ea;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Umphlette Dinner Planner</h2>

<button onclick="generate()">Generate Week</button>

<div id="planner"></div>

<h3>Shopping List</h3>

<div id="grocery"></div>

<script>

const takeout=[
"Chinese",
"Pizza",
"Wendy's",
"Mexican",
"BBQ",
"Subs"
]

const weekdayMeals=[
{meal:"Tacos",side:"Mexican Rice",items:["Ground beef","Taco shells","Lettuce","Tomatoes"]},
{meal:"Chicken Alfredo",side:"Garden Salad",items:["Chicken breast","Fettuccine","Alfredo sauce","Salad mix"]},
{meal:"Sloppy Joes",side:"Coleslaw",items:["Ground beef","Sloppy joe sauce","Burger buns","Coleslaw mix"]},
{meal:"Chicken Quesadillas",side:"Mexican Rice",items:["Chicken","Tortillas","Cheese","Rice"]},
{meal:"Spaghetti",side:"Garlic Bread",items:["Ground beef","Spaghetti","Pasta sauce","Bread"]},
{meal:"Fajitas",side:"Mexican Rice",items:["Chicken","Peppers","Tortillas","Rice"]},
{meal:"BLTs",side:"Pasta Salad",items:["Bacon","Bread","Lettuce","Tomatoes","Pasta salad"]},
{meal:"Hamburger Helper",side:"Garden Salad",items:["Ground beef","Hamburger helper","Salad mix"]}
]

const weekendMeals=[
{meal:"Steak",side:"Baked Beans",items:["Steak","Baked beans"]},
{meal:"Ribs",side:"Mac & Cheese",items:["Ribs","BBQ sauce","Mac & cheese"]},
{meal:"Roast (Slow Cooker)",side:"Mashed Potatoes",items:["Roast","Potatoes","Carrots"]},
{meal:"Chicken & Dumplings",side:"Cornbread",items:["Chicken","Dumplings","Cornbread mix"]},
{meal:"Pork Chops",side:"Fried Okra",items:["Pork chops","Okra"]},
{meal:"Shrimp Boil",side:"Hush Puppies",items:["Shrimp","Sausage","Corn","Potatoes"]},
{meal:"Meatloaf",side:"Green Beans",items:["Ground beef","Green beans","Breadcrumbs"]},
{meal:"Chili",side:"Cornbread",items:["Ground beef","Beans","Tomato sauce","Cornbread mix"]},
{meal:"Cubed Steak",side:"Green Beans",items:["Cubed steak","Green beans"]}
]

function r(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function getHistory(){
return JSON.parse(localStorage.getItem("mealHistory")||"[]")
}

function saveHistory(history){
localStorage.setItem("mealHistory",JSON.stringify(history))
}

function pickMeal(pool,history,used){

let filtered=pool.filter(m=>
!history.includes(m.meal) && !used.includes(m.meal)
)

if(filtered.length===0){
filtered=pool
}

return r(filtered)

}

function categorize(item){

item=item.toLowerCase()

if(item.includes("beef")||item.includes("chicken")||item.includes("pork")||item.includes("steak")||item.includes("shrimp"))
return "Meat"

if(item.includes("lettuce")||item.includes("tomato")||item.includes("potato")||item.includes("carrot")||item.includes("pepper"))
return "Produce"

if(item.includes("sauce")||item.includes("mix")||item.includes("pasta")||item.includes("rice")||item.includes("bread"))
return "Pantry"

return "Other"

}

function generate(){

let history=getHistory()

let used=[]

let grocery={}

let plan=[]

let mon=pickMeal(weekdayMeals,history,used)
used.push(mon.meal)

let wed=pickMeal(weekdayMeals,history,used)
used.push(wed.meal)

let thu=pickMeal(weekdayMeals,history,used)
used.push(thu.meal)

let fri=pickMeal(weekendMeals,history,used)
used.push(fri.meal)

let sat=pickMeal(weekendMeals,history,used)
used.push(sat.meal)

let sun=pickMeal(weekendMeals,history,used)
used.push(sun.meal)

plan=[
{day:"Monday",data:mon},
{day:"Tuesday",takeout:r(takeout)},
{day:"Wednesday",data:wed},
{day:"Thursday",data:thu},
{day:"Friday",data:fri},
{day:"Saturday",data:sat},
{day:"Sunday",data:sun}
]

used.forEach(m=>history.push(m))
history=history.slice(-28)

saveHistory(history)

let html=""

plan.forEach(d=>{

html+="<div class='day'>"
html+="<h3>"+d.day+"</h3>"

if(d.takeout){

html+="<div class='meal'>🍔 "+d.takeout+"</div>"

}else{

html+="<div class='meal'>🍽 "+d.data.meal+"</div>"
html+="<div class='side'>🥗 "+d.data.side+"</div>"

d.data.items.forEach(i=>{

let cat=categorize(i)

if(!grocery[cat]) grocery[cat]=[]

grocery[cat].push(i)

})

}

html+="</div>"

})

document.getElementById("planner").innerHTML=html

let list=""

for(let cat in grocery){

list+="<h4>"+cat+"</h4><ul>"

grocery[cat].forEach(i=>{

list+="<li>"+i+"</li>"

})

list+="</ul>"

}

document.getElementById("grocery").innerHTML=list

}

</script>

</body>
</html>
